# ─── API and Security Infrastructure ────────────────────────────────────────

"""Developer or partner API key for programmatic access."""
type APIKey {
  id: ID!
  name: String!
  keyPrefix: String!
  environment: String!
  scopes: [String!]!
  createdAt: DateTime!
  expiresAt: DateTime
  lastUsedAt: DateTime
  isActive: Boolean!
  webhooks: [Webhook!]
}

"""Payment network token (HCE, SE, SXS, Stored Payment)."""
type Token {
  id: ID!
  tokenType: TokenType!
  tokenValue: String!
  last4: String!
  status: TokenStatus!
  linkedCardId: ID!
  walletProvider: String
  deviceId: String
  provisionedAt: DateTime!
  lastUsedAt: DateTime
  expiresAt: DateTime
  requestor: String
  networkReference: String
}

"""Webhook subscription for event-based notifications."""
type Webhook {
  id: ID!
  url: URL!
  events: [WebhookEvent!]!
  isActive: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
  secret: String
  signingAlgorithm: String!
  lastTriggeredAt: DateTime
  failureCount: Int!
  description: String
}

# ─── Root Types ──────────────────────────────────────────────────────────────

type Query {
  creditCard(id: ID!): CreditCard
  creditCards(customerId: ID!): [CreditCard!]
  accountBalance(accountId: ID!): AccountBalance
  statementBalance(accountId: ID!, statementDate: Date): StatementBalance
  transaction(id: ID!): Transaction
  transactions(
    accountId: ID!
    limit: Int
    offset: Int
    startDate: Date
    endDate: Date
    type: TransactionType
  ): [Transaction!]
  statement(id: ID!): Statement
  statements(accountId: ID!): [Statement!]
  payment(id: ID!): Payment
  payments(accountId: ID!): [Payment!]
  reward(id: ID!): Reward
  rewards(accountId: ID!): [Reward!]
  cashBackBonus(accountId: ID!): CashBackBonus
  offers(accountId: ID!): [Offer!]
  promotions(accountId: ID!): [Promotion!]
  creditScore(customerId: ID!): CreditScore
  creditMonitor(customerId: ID!): CreditMonitor
  customer(id: ID!): Customer
  alerts(accountId: ID!): [Alert!]
  fraudAlerts(accountId: ID!): [FraudAlert!]
  securityAlerts(customerId: ID!): [SecurityAlert!]
  savings(id: ID!): Savings
  moneyMarket(id: ID!): MoneyMarket
  cd(id: ID!): CD
  personalLoan(id: ID!): PersonalLoan
  studentLoan(id: ID!): StudentLoan
  heloc(id: ID!): HELOC
  mortgage(id: ID!): Mortgage
  token(id: ID!): Token
  tokens(accountId: ID!): [Token!]
  webhook(id: ID!): Webhook
  webhooks(apiKeyId: ID!): [Webhook!]
  apiKey(id: ID!): APIKey
}

type Mutation {
  makePayment(accountId: ID!, amount: Decimal!, paymentMethodId: ID!, scheduledDate: Date): Payment
  setupAutoPay(accountId: ID!, paymentType: String!, paymentMethodId: ID!, paymentDay: Int): AutoPay
  cancelAutoPay(accountId: ID!): AutoPay
  addBankAccount(routingNumber: String!, accountNumber: String!, accountType: String!, accountHolderName: String!): BankAccount
  removeBankAccount(bankAccountId: ID!): Boolean
  addAuthorizedUser(creditCardId: ID!, firstName: String!, lastName: String!, dateOfBirth: Date): AuthorizedUser
  removeAuthorizedUser(authorizedUserId: ID!): Boolean
  activateCashBackBonus(accountId: ID!, bonusId: ID!): CashBackBonus
  activateOffer(accountId: ID!, offerId: ID!): Offer
  redeemRewards(accountId: ID!, amount: Decimal!, redemptionType: RedemptionType!, targetBankAccountId: ID): RewardRedemption
  freezeCard(cardId: ID!): Card
  unfreezeCard(cardId: ID!): Card
  reportFraud(transactionId: ID!, description: String!): FraudAlert
  acknowledgeSecurityAlert(alertId: ID!): SecurityAlert
  createWebhook(url: URL!, events: [WebhookEvent!]!, description: String): Webhook
  deleteWebhook(webhookId: ID!): Boolean
  updateProfile(customerId: ID!, paperlessEnabled: Boolean, marketingOptIn: Boolean, preferredLanguage: String): Profile
}
